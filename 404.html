<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>S.I.G.N.A.L-L.O.S.T // Redirecting...</title>
    <style>
        body { background: #0a0a0a; color: #00f2ff; font-family: 'Space Grotesk', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; letter-spacing: 0.2em; text-transform: uppercase; font-size: 0.75rem; }
        .spinner { width: 40px; height: 40px; border: 2px solid rgba(0, 242, 255, 0.1); border-top: 2px solid #00f2ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 20px; }
        a { color: #888; text-decoration: none; border-bottom: 1px solid #444; margin-top: 20px; transition: color 0.2s; }
        a:hover { color: #00f2ff; border-color: #00f2ff; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script type="text/javascript">
        // 404-to-SPA Redirect Pattern (v2.1)
        // This script handles nested paths and funnels them back to a root index.html hashtag.
        (function() {
            var segmentCount = 0;
            var pathSegments = window.location.pathname.split('/');
            
            // Clean up empty segments (e.g., trailing slash)
            var cleanSegments = pathSegments.filter(function(s) { return s.length > 0; });
            var hash = cleanSegments.join('/');
            
            // Calculate how many '../' we need to get back to root index.html
            // If we are at /ergeg, we are 1 level deep.
            var depth = cleanSegments.length;
            var rootRedirect = '';
            for (var i = 0; i < depth; i++) { rootRedirect += '../'; }
            
            // If at root, redirect to index.html directly
            if (depth === 0) rootRedirect = './';
            
            // Universal Hash Funnel
            // Example: /projects -> /index.html#projects
            var target = rootRedirect + 'index.html' + (hash ? '#' + hash : '');
            
            console.log("Funnelling to Hash Shell: " + target);
            window.location.replace(target);
        })();
    </script>
</head>
<body>
    <div class="spinner"></div>
    <div style="display:flex; flex-direction:column; align-items:center;">
        <div>Synchronizing System Shell...</div>
        <!-- Fallback if JS fails -->
        <noscript><a href="index.html">Click here to reboot manually</a></noscript>
    </div>
</body>
</html>
