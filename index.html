<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
  <meta name="description"
    data-attr="content:meta.description"
    content="KrArjan — Student Developer. Building software, bots, tools, and digital systems." />
  <meta name="theme-color" content="#131313" />
  <title data-content="meta.title">KrArjan</title>

  <link rel="canonical" data-attr="href:meta.url" href="https://krarjan.dev/" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph (values auto-injected from portfolio.config.js) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" data-attr="content:meta.title" content="KrArjan — Student Developer" />
  <meta property="og:description" data-attr="content:meta.description" content="Building software, bots, tools, and digital systems." />
  <meta property="og:url" data-attr="content:meta.url" content="https://krarjan.dev/" />
  <meta property="og:image" data-attr="content:meta.ogImage" content="/config/images/pfp.webp" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" data-attr="content:meta.title" content="KrArjan — Student Developer" />
  <meta name="twitter:description" data-attr="content:meta.description" content="Building software, bots, tools, and digital systems." />

  <link rel="icon" href="/favicon.ico?v=2" type="image/x-icon" />
  <link rel="shortcut icon" href="/favicon.ico?v=2" type="image/x-icon" />

  <!-- Preload LCP image (profile picture) -->
  <link rel="preload" href="/config/images/pfp.webp" as="image" fetchpriority="high" />
  <link rel="preload" href="/src/js/loader.js" as="script" />
  <link rel="dns-prefetch" href="https://challenges.cloudflare.com" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />

  <!-- Stylesheets (order matters) -->
  <link rel="stylesheet" href="/src/css/variables.css" />
  <link rel="stylesheet" href="/src/css/base.css" />

  <!-- Deferred Stylesheets (Non-blocking) -->
  <link rel="stylesheet" href="/src/css/animations.css" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="/src/css/layout.css" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="/src/css/components.css" media="print" onload="this.media='all'" />
</head>

<body>

  <!-- Global backgrounds (behind all content) -->
  <div id="particles-bg"></div>
  <div class="bg-digital-grid-global"></div>

  <!--
  All page sections and chrome (nav, drawer, footer, etc.) are loaded
  at runtime by loader.js from the pages/ directory.
  This placeholder is removed after injection is complete.
-->
  <div id="partials-root"></div>


  <!-- =====================================================================
     SCRIPTS
     loader.js fetches all page partials, builds the DOM, then loads
     the app scripts in order. Included here at the bottom with defer.
     ===================================================================== -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js" defer></script>
  <script src="/config/theme.config.js" defer></script>
  <script src="/src/js/loader.js" defer></script>

</body>

</html>
