<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
  <meta name="description"
    content="KrArjan — Student Developer & Technical Builder. Building software, bots, tools, and digital systems that move the needle." />
  <meta name="theme-color" content="#131313" />
  <title>KrArjan | Student Developer & Technical Builder</title>
  <link rel="canonical" href="https://krarjan.dev/" />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "KrArjan",
      "url": "https://krarjan.dev",
      "jobTitle": "Student Developer & Technical Builder",
      "description": "Building software, bots, tools, and digital systems since 2021.",
      "sameAs": [
        "https://github.com/KrArjan"
      ]
    }
  </script>

  <link rel="icon" href="/favicon.ico?v=2" type="image/x-icon" />
  <link rel="shortcut icon" href="/favicon.ico?v=2" type="image/x-icon" />

  <!-- Google Fonts (non-blocking) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" /></noscript>

  <!-- Material Symbols (non-blocking) -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" /></noscript>

  <!-- Cloudflare Turnstile (Anti-Bot) -->
  <link rel="preconnect" href="https://challenges.cloudflare.com">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>

  <!-- Stylesheets (order matters) -->
  <link rel="stylesheet" href="/src/css/variables.css" />
  <link rel="stylesheet" href="/src/css/base.css" />

  <!-- Deferred Stylesheets (Non-blocking) -->
  <link rel="stylesheet" href="/src/css/animations.css" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="/src/css/layout.css" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="/src/css/components.css" media="print" onload="this.media='all'" />
</head>

<body>

  <!-- Global particle canvas (behind all content) -->
  <div id="particles-bg"></div>

  <!--
  All page sections and chrome (nav, drawer, footer, etc.) are loaded
  at runtime by loader.js from the pages/ directory.
  This placeholder is removed after injection is complete.
-->
  <div id="partials-root"></div>


  <!-- =====================================================================
     SCRIPTS
     loader.js fetches all page partials, builds the DOM, then loads
     the app scripts in order. Included here at the bottom with defer.
     ===================================================================== -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js" defer></script>
  <script src="/config/theme.config.js" defer></script>
  <script src="/src/js/loader.js" defer></script>

</body>

</html>
