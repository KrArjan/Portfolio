name = "portfolio"
main = "_worker.js"
compatibility_date = "2024-03-29"
#
[assets]
directory = "./"
not_found_handling = "single-page-application"

[vars]
# ==========================================================
# DEFAULT VARIABLE STUBS — Override these in the Cloudflare
# dashboard as Secrets so they persist across every build.
# Dashboard Secrets always take precedence over these values.
# ==========================================================

# Public key — safe to keep here
TURNSTILE_SITE_KEY = "0x4AAAAAACxrRyQCBE-RD7A1"

# Sensitive keys — set the real values as Secrets in the dashboard
# These empty defaults prevent them from being wiped on new builds
TURNSTILE_SECRET_KEY  = ""
DISCORD_WEBHOOK_URL   = ""
DISCORD_BOT_TOKEN     = ""
DISCORD_USER_ID       = ""
EMAILJS_SERVICE_ID    = ""
EMAILJS_TEMPLATE_ID   = ""
EMAILJS_PUBLIC_KEY    = ""
EMAILJS_PRIVATE_KEY   = ""

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
