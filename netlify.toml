[build]
  publish = "."
  functions = "api"

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[headers]
  for = "/wrangler.toml"
    [headers.values]
    Cache-Control = "no-store"
  for = "/_worker.js"
    [headers.values]
    Cache-Control = "no-store"
  for = "/.dev.vars"
    [headers.values]
    Cache-Control = "no-store"
  for = "/.assetsignore"
    [headers.values]
    Cache-Control = "no-store"
