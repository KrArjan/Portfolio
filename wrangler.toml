name = "opensource-portfolio"
main = "_worker.js"
compatibility_date = "2024-04-03"
keep_vars = true

[assets]
directory = "./"
binding = "ASSETS"
not_found_handling = "single-page-application"

# ==========================================================
# DEFAULT VARIABLE STUBS — Override these in the Cloudflare
# dashboard as Secrets so they persist across every build.
# Dashboard Secrets always take precedence over these values.
# ==========================================================

# Sensitive keys — DO NOT add these here for GitHub builds.
# Instead, add them once in the Cloudflare Dashboard under:
# Settings -> Variables -> Secrets
# This ensures they persist across every build and stay private.
[vars]
TURNSTILE_SITE_KEY = "0x4AAAAAACxrRyQCBE-RD7A1"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
