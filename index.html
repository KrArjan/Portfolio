<head>

  <link rel="icon" href="/favicon.ico?v=2" type="image/x-icon" />
  <link rel="shortcut icon" href="/favicon.ico?v=2" type="image/x-icon" />

  <!-- Preload LCP components -->
  <link rel="preload" href="/config/images/pfp/pfp-200.webp" as="image" fetchpriority="high" />
  <link rel="preload" href="/src/js/loader.js" as="script" />
  <link rel="dns-prefetch" href="https://challenges.cloudflare.com" />

  <!-- Fonts & Icons (Non-Blocking) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" media="print" onload="this.media='all'" />

  <!-- Critical Styles (Inlined for 0-render block) -->
  <style>
    :root {
      --surface-dim:#131313;--surface:#131313;--surface-lowest:#0e0e0e;--surface-low:#1c1b1b;--surface-mid:#201f1f;--surface-high:#2a2a2a;--surface-highest:#353534;--primary:#e1fdff;--primary-container:#00f2ff;--primary-fixed:#74f5ff;--primary-fixed-dim:#00dbe7;--on-primary:#00363a;--on-primary-container:#006a71;--on-primary-fixed:#002022;--on-primary-fixed-variant:#004f54;--secondary:#dcb8ff;--secondary-container:#7701d0;--secondary-fixed:#efdbff;--secondary-fixed-dim:#dcb8ff;--on-secondary:#480081;--on-secondary-container:#dcb7ff;--on-secondary-fixed:#2c0051;--tertiary:#fff6e4;--tertiary-container:#fed83a;--tertiary-fixed:#ffe173;--tertiary-fixed-dim:#e8c423;--on-tertiary:#3b2f00;--on-tertiary-container:#725e00;--on-surface:#e5e2e1;--on-surface-variant:#b9cacb;--on-background:#e5e2e1;--outline:#849495;--outline-variant:#3a494b;--error:#ffb4ab;--error-container:#93000a;--on-error:#690005;--gradient-primary:linear-gradient(135deg, #00f2ff 0%, #7701d0 100%);--gradient-primary-45:linear-gradient(45deg, #00f2ff 0%, #7701d0 100%);--gradient-text:linear-gradient(135deg, #00f2ff 30%, #7701d0 100%);--glow-primary:0 15px 40px rgba(119, 1, 208, 0.15);--glow-primary-hover:0 20px 60px rgba(119, 1, 208, 0.30);--glow-cyan:0 0 20px rgba(0, 242, 255, 0.15);--glow-cyan-strong:0 0 30px rgba(0, 242, 255, 0.40);--border-glass:1px solid rgba(255, 255, 255, 0.06);--border-cyan-dim:1px solid rgba(0, 242, 255, 0.08);--border-cyan-glow:1px solid rgba(0, 242, 255, 0.30);--font-headline:'Space Grotesk', sans-serif;--font-body:'Manrope', sans-serif;--space-xs:4px;--space-sm:8px;--space-md:16px;--space-lg:24px;--space-xl:40px;--space-2xl:64px;--space-3xl:96px;--space-4xl:128px;--radius-sm:2px;--radius-md:4px;--radius-lg:8px;--radius-xl:12px;--radius-pill:999px;--ease-smooth:cubic-bezier(0.4, 0, 0.2, 1);--ease-spring:cubic-bezier(0.34, 1.56, 0.64, 1);--dur-fast:150ms;--dur-base:250ms;--dur-slow:400ms;--dur-xslow:600ms;--z-base:0;--z-raised:10;--z-overlay:50;--z-nav:100;--z-drawer:200;--z-boot:9999;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:16px;-webkit-text-size-adjust:100%;max-width:100vw;overflow-x:hidden;}
    body{background-color:var(--surface-dim);color:var(--on-surface);font-family:var(--font-body);font-weight:400;line-height:1.6;overflow-x:hidden;max-width:100vw;min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeSpeed;}
    #particles-bg{position:fixed;inset:0;z-index:-1;pointer-events:none;}
    #particles-bg canvas{position:absolute;inset:0;width:100% !important;height:100% !important;}
    ::selection{background:var(--primary-container);color:var(--on-primary-fixed);}
    img{max-width:100%;height:auto;display:block;}
    a{color:inherit;text-decoration:none;cursor:pointer;}
    button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit;color:inherit;}
    ul,ol{list-style:none;}
    .display-xl{font-family:var(--font-headline);font-size:clamp(2.2rem, 10vw, 8rem);font-weight:700;line-height:0.95;letter-spacing:-0.03em;}
    .display-lg{font-family:var(--font-headline);font-size:clamp(1.8rem, 7vw, 5.5rem);font-weight:700;line-height:1;letter-spacing:-0.025em;}
    .display-md{font-family:var(--font-headline);font-size:clamp(1.45rem, 4vw, 3rem);font-weight:700;line-height:1.05;letter-spacing:-0.02em;}
    .headline-lg{font-family:var(--font-headline);font-size:1.75rem;font-weight:700;letter-spacing:-0.015em;}
    .body-md{font-size:0.9375rem;line-height:1.65;}
    .gradient-text{background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:var(--surface-lowest);}
    ::-webkit-scrollbar-thumb{background:var(--outline-variant);border-radius:2px;}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;user-select:none;}
  </style>

  <!-- Deferred Non-Critical Styles -->
  <link rel="stylesheet" href="/src/css/animations.css" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="/src/css/layout.css" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="/src/css/components.css" media="print" onload="this.media='all'" />
</head>

<body>

  <!-- Global backgrounds (behind all content) -->
  <div id="particles-bg"></div>
  <div class="bg-digital-grid-global"></div>

  <!--
  All page sections and chrome (nav, drawer, footer, etc.) are loaded
  at runtime by loader.js from the pages/ directory.
  This placeholder is removed after injection is complete.
-->
  <div id="partials-root"></div>


  <!-- =====================================================================
     SCRIPTS
     loader.js fetches all page partials, builds the DOM, then loads
     the app scripts in order. Included here at the bottom with defer.
     ===================================================================== -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js" defer></script>
  <script src="/config/theme.config.js" defer></script>
  <script src="/src/js/loader.js" defer></script>

</body>

</html>
